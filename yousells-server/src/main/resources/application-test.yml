spring:
  datasource:
    url: jdbc:h2:mem:yousells_${random.uuid};MODE=MySQL;DATABASE_TO_UPPER=false
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:test-schema.sql

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

app:
  jwt:
    secret: VGhpc0lzQVRlc3RTZWNyZXRLZXlGb3JZb3VTZWxsc0pXVEF1dGg0NTY3ODkwMTIzNA==
    access-token-expire-seconds: 43200
    issuer: yousells-server
  ai:
    mock:
      enabled: true

logging:
  level:
    com.yousells.modules.customer.mapper: debug
