spring:
  application:
    name: yousells-server
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:13306}/${MYSQL_DATABASE:yousells}?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

server:
  port: ${SERVER_PORT:8080}

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health

app:
  cors:
    allowed-origins: ${WEB_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174}
  jwt:
    secret: ${JWT_SECRET}
    access-token-expire-seconds: ${JWT_ACCESS_TOKEN_EXPIRE_SECONDS:43200}
    issuer: ${JWT_ISSUER:yousells-server}
  ai:
    llm:
      endpoint: ${AI_LLM_ENDPOINT:https://api.openai.com}
      api-key: ${AI_LLM_API_KEY:}
      model: ${AI_LLM_MODEL:gpt-4o}
      temperature: ${AI_LLM_TEMPERATURE:0.3}
      max-retries: ${AI_LLM_MAX_RETRIES:2}
      timeout-seconds: ${AI_LLM_TIMEOUT_SECONDS:60}
    embedding:
      endpoint: ${AI_EMBEDDING_ENDPOINT:https://api.openai.com}
      api-key: ${AI_EMBEDDING_API_KEY:}
      model: ${AI_EMBEDDING_MODEL:text-embedding-3-small}
    qdrant:
      host: ${QDRANT_HOST:localhost}
      port: ${QDRANT_PORT:6334}
      api-key: ${QDRANT_API_KEY:}
      collection-scripts: ${QDRANT_COLLECTION_SCRIPTS:yousells_scripts}
    mock:
      enabled: ${AI_MOCK_ENABLED:false}

logging:
  level:
    root: info
